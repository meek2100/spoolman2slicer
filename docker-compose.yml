version: '3.8'

services:
  spoolman2slicer:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/bofh69/spoolman2slicer:latest #use :stage for the current 'main' branche or :latest for the latest stable release
    container_name: spoolman2slicer
    restart: unless-stopped
    environment:
      # Required settings
      - DIR=/configs
      - URL=http://spoolman.local:7912
      - SLICER=prusaslicer
      
      # Optional operational settings
      - UPDATES=true            # Continuous monitoring mode (-U)
      - DELETE_ALL=false        # Clear config dir on start (-D)
      - VERBOSE=false           # Debug logging (-v)
      - VARIANTS=               # Comma-separated variant list (-V)
      - CREATE_PER_SPOOL=       # Options: all, least-left, most-recent (--create-per-spool)
    volumes:
      - ./configs:/configs
